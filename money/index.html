      padding: 0.2rem; line-height: 1;
    }
    .star-btn:hover, .star-btn.active { color: var(--accent); transform: scale(1.1); }
    .subscribe-form { max-width: 380px; margin: 0 auto; }
    .subscribe-form label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--ink); }
    .email-input {
      width: 100%; padding: 0.85rem 1.1rem; border-radius: var(--radius-sm);

  /* ── Survey Engine ── */
  class SurveyEngine {
    constructor() {
      this.app = document.getElementById('app');
      this.step = -1; // -1 = welcome
      this.answers = {};
      this.tapSelected = null;
      this.totalSteps = SURVEY_DATA.length;
    }

    init() {
      if (localStorage.getItem(LS_COMPLETED)) {
        const saved = JSON.parse(localStorage.getItem(LS_RESPONSE) || '{}');
        this.renderCompleted(saved);
        return;
      }
      this.renderWelcome();
    }

    /* ── Screens ── */
    renderWelcome() {
      document.getElementById('progress-wrap').classList.add('hidden');
      this.app.innerHTML = `
        <div class="glass-card" style="text-align:center">
          <img src="images/oze-logo.webp" alt="oze.au" style="height:44px;width:auto;margin:0 auto 1rem" width="99" height="44">
          <h1>Money in Your Wallet</h1>
          <p class="welcome-sub">Australian Currency Knowledge Survey</p>
          <div class="badge-row">
            <span class="badge">🔒 Anonymous</span>
            <span class="badge">⏱ ~5 minutes</span>
            <span class="badge">1️⃣ One attempt</span>
          </div>
          <p>How well do you know the people, colours and stories on Australia's banknotes? Test yourself — it's more interesting than you might think.</p>
          <div class="nav-row" style="margin-top:1.5rem">
            <button class="btn btn-primary" id="btn-start">Begin Survey →</button>
          </div>
        </div>`;
      document.getElementById('btn-start').onclick = () => { this.step = 0; this.renderStep(); };
    }

    renderCompleted(saved) {
      document.getElementById('progress-wrap').classList.add('hidden');
      this.app.innerHTML = `
        <div class="glass-card">
          <h2>You've already completed this survey</h2>
          <p style="margin:1rem 0">Thanks for participating! Each person gets one attempt to keep results fair.</p>
          <div class="nav-row">
            <button class="btn btn-primary" id="btn-view">View Your Results</button>
          </div>
        </div>`;
      document.getElementById('btn-view').onclick = () => this.renderResults(saved);
    }

    renderStep() {
      const q = SURVEY_DATA[this.step];
      document.getElementById('progress-wrap').classList.remove('hidden');
      this.updateProgress(q.phase);
      this.tapSelected = null;

      let body = '';
      if (q.type === 'demographics') body = this.renderDemographics(q);
      else if (q.type === 'single' || q.type === 'checkbox') body = this.renderChoice(q);
      else if (q.type === 'rating') body = this.renderRating(q);
      else if (q.type === 'text') body = this.renderText(q);
      else if (q.type === 'drag-colours' || q.type === 'drag-people') body = this.renderDragDrop(q);

      this.app.innerHTML = `<div class="glass-card" id="card">
        <span class="phase-tag">${q.phase}</span>
        <h2 class="question-text">${q.question}</h2>
        ${body}
        <div class="nav-row">
          ${this.step > 0 ? '<button class="btn btn-ghost" id="btn-back">← Back</button>' : ''}
          <button class="btn btn-primary" id="btn-next" disabled>${this.step === this.totalSteps - 1 ? 'See Results →' : 'Next →'}</button>
        </div>
      </div>`;

      this.bindStepEvents(q);
      if (this.answers[q.id]) this.restoreAnswer(q);
    }

    renderDemographics(q) {
      const fieldCls = id => id === 'age' ? 'demo-field--age' : 'demo-field--gender';
      return `<div class="demo-fields">${q.fields.map(f => `
        <div class="demo-field ${fieldCls(f.id)}">
          <h3>${f.label}</h3>
          <div class="options" data-field="${f.id}">
            ${f.options.map(o => `<label class="option"><input type="radio" name="${f.id}" value="${o}"><span class="option-label">${o}</span></label>`).join('')}
          </div>
        </div>`).join('')}</div>`;
    }

    renderChoice(q) {
      const inputType = q.type === 'checkbox' ? 'checkbox' : 'radio';
      const name = q.id;
      let gridClass = '';
      if (q.type === 'checkbox') gridClass = ' options-multi';
      else if (q.grid === 2) gridClass = ` options-grid options-grid-2${q.gridCols === 3 ? ' cols-3' : ''}`;
      else if (q.grid) gridClass = ' options-grid';
      return `<div class="options${gridClass}" data-qid="${q.id}">
        ${q.options.map(o => `<label class="option"><input type="${inputType}" name="${name}" value="${o}"><span class="option-label">${o}</span></label>`).join('')}
      </div>`;
    }

    personChip(it, placed) {
      const cls = placed ? ' person-chip--placed' : '';
      const sub = placed ? '' : `<span class="chip-sub">${it.sub}</span>`;
      return `<div class="dnd-item person-chip${cls}" draggable="true" data-id="${it.id}" data-label="${it.label}">
        <span>${it.label}</span>${sub}
      </div>`;
    }

    renderRating(q) {
      return `<div class="rating-row" data-qid="${q.id}">
        ${[1,2,3,4,5].map(n => `<button type="button" class="rating-btn" data-val="${n}">${n}</button>`).join('')}
      </div>
      <div class="rating-labels"><span>${q.labels[0]}</span><span>${q.labels[4]}</span></div>`;
    }

    renderText(q) {
      return `<textarea class="text-input" id="text-${q.id}" placeholder="${q.placeholder || ''}" rows="3"></textarea>`;
    }

    renderDragDrop(q) {
      const isColour = q.type === 'drag-colours';
      if (!this.answers[q.id]) this.answers[q.id] = { placements: {} };
      const placements = this.answers[q.id].placements || {};
      const placedIds = Object.values(placements).flat();
      const hint = q.hint || 'Drag items to the notes, or <strong>tap to select → tap a note</strong> on mobile.';

      if (isColour) {
        if (!this.answers[q.id].poolOrder) {
          this.answers[q.id].poolOrder = shuffleArray(q.items.map(it => it.id));
        }
        const order = this.answers[q.id].poolOrder;
        const pool = q.items
          .filter(it => !placedIds.includes(it.id))
          .sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));

        const poolHTML = pool.map(it =>
          `<div class="dnd-item colour-swatch" draggable="true" role="button" tabindex="0"
            data-id="${it.id}" aria-label="${it.ariaLabel}" title="${it.ariaLabel}">
            <div class="swatch-inner ${it.class}"></div>
          </div>`
        ).join('');

        const zonesHTML = q.zones.map(z => {
          const pid = (placements[z] || [])[0];
          const it = pid ? q.items.find(i => i.id === pid) : null;
          const swatchHTML = it ? `<div class="placed-swatch ${it.class}"></div>` : '';
          const hasColour = !!it;
          return `<div class="note-drop" data-zone="${z}">
            <div class="note-card${hasColour ? ' has-colour' : ''}">
              ${swatchHTML}
              <span class="note-value">$${z}</span>
            </div>
            <div class="zone-items">${it ? `<div class="dnd-item colour-swatch" data-id="${it.id}"><div class="swatch-inner ${it.class}"></div></div>` : ''}</div>
          </div>`;
        }).join('');

        return `<p class="dnd-hint">${hint}</p>
          <div class="colour-match-wrap">
            <div class="dnd-colours-pool" id="dnd-pool">${poolHTML}</div>
            <div class="dnd-colours-grid" id="dnd-zones">${zonesHTML}</div>
          </div>`;
      }

      const poolHTML = q.items
        .filter(it => !placedIds.includes(it.id))
        .map(it => this.personChip(it, false))
        .join('');

      const zonesHTML = q.zones.map(z => {
        const placed = (placements[z] || []).map(pid => {
          const it = q.items.find(i => i.id === pid);
          return it ? this.personChip(it, true) : '';
        }).join('');
        return `<div class="people-note-zone" data-zone="${z}">
          <div class="note-badge note-${z}">$${z}</div>
          <div class="zone-items">${placed}</div>
        </div>`;
      }).join('');

      return `<p class="dnd-hint">${hint}</p>
        <div class="dnd-people-pool" id="dnd-pool">${poolHTML}</div>
        <div class="dnd-people-grid" id="dnd-zones">${zonesHTML}</div>`;
    }

    /* ── Events ── */
    bindStepEvents(q) {
      const btnNext = document.getElementById('btn-next');
      const btnBack = document.getElementById('btn-back');
      if (btnBack) btnBack.onclick = () => { this.step--; this.renderStep(); };
      btnNext.onclick = () => this.next();

      if (q.type === 'demographics') {
        this.app.querySelectorAll('.demo-field input').forEach(inp => {
          inp.addEventListener('change', () => {
            const group = inp.closest('.options');
            group.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            inp.closest('.option').classList.add('selected');
            this.saveDemographics();
          });
        });
      } else if (q.type === 'single' || q.type === 'checkbox') {
        const group = this.app.querySelector('.options');
        group.querySelectorAll('input').forEach(inp => {
          inp.addEventListener('change', () => {
            const opt = inp.closest('.option');
            if (q.type === 'single') {
              group.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
              this.answers[q.id] = inp.value;
            } else {
              opt.classList.toggle('selected', inp.checked);
              this.answers[q.id] = [...group.querySelectorAll('input:checked')].map(c => c.value);
            }
            btnNext.disabled = !this.isValid(q);
          });
        });
      } else if (q.type === 'rating') {
        this.app.querySelectorAll('.rating-btn').forEach(btn => {
          btn.onclick = () => {
            this.app.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            this.answers[q.id] = +btn.dataset.val;
            btnNext.disabled = false;
          };
        });
      } else if (q.type === 'text') {
        const ta = document.getElementById(`text-${q.id}`);
        ta.oninput = () => { this.answers[q.id] = ta.value; btnNext.disabled = false; };
        if (q.optional) btnNext.disabled = false;
      } else if (q.type === 'drag-colours' || q.type === 'drag-people') {
        this.bindDragDrop(q, btnNext);
      }
    }

    bindDragDrop(q, btnNext) {
      const pool = document.getElementById('dnd-pool');
      const zones = document.getElementById('dnd-zones');
      if (!this.answers[q.id]) this.answers[q.id] = { placements: {} };
      q.zones.forEach(z => { if (!this.answers[q.id].placements[z]) this.answers[q.id].placements[z] = []; });

      const getItems = () => this.app.querySelectorAll('.dnd-item');

      const isColour = q.type === 'drag-colours';

      const moveItem = (itemId, zoneKey) => {
        const placements = this.answers[q.id].placements;
        for (const z of Object.keys(placements)) {
          placements[z] = placements[z].filter(id => id !== itemId);
        }
        if (zoneKey !== 'pool') {
          if (isColour && placements[zoneKey].length) {
            /* single swatch per note — displaced swatch returns to pool */
          }
          placements[zoneKey] = isColour ? [itemId] : [...placements[zoneKey], itemId];
        }
        this.tapSelected = null;
        this.renderStep();
        document.getElementById('btn-next').disabled = !this.isValid(q);
      };

      getItems().forEach(item => {
        item.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', item.dataset.id);
          item.classList.add('dragging');
        });
        item.addEventListener('dragend', () => item.classList.remove('dragging'));

        item.addEventListener('click', () => {
          if (this.tapSelected === item.dataset.id) { this.tapSelected = null; item.classList.remove('selected-tap'); }
          else {
            getItems().forEach(i => i.classList.remove('selected-tap'));
            this.tapSelected = item.dataset.id;
            item.classList.add('selected-tap');
          }
        });
      });

      pool.addEventListener('dragover', e => { e.preventDefault(); pool.style.borderColor = 'var(--accent)'; });
      pool.addEventListener('dragleave', () => { pool.style.borderColor = ''; });
      pool.addEventListener('drop', e => {
        e.preventDefault(); pool.style.borderColor = '';
        moveItem(e.dataTransfer.getData('text/plain'), 'pool');
      });
      pool.addEventListener('click', () => {
        if (this.tapSelected) moveItem(this.tapSelected, 'pool');
      });

      zones.querySelectorAll('.dnd-zone, .note-drop, .people-note-zone').forEach(zone => {
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
        zone.addEventListener('drop', e => {
          e.preventDefault(); zone.classList.remove('drag-over');
          moveItem(e.dataTransfer.getData('text/plain'), zone.dataset.zone);
        });
        zone.addEventListener('click', () => {
          if (this.tapSelected) {
            moveItem(this.tapSelected, zone.dataset.zone);
          } else if (isColour && zone.classList.contains('note-drop')) {
            const pid = this.answers[q.id].placements[zone.dataset.zone]?.[0];
            if (pid) moveItem(pid, 'pool');
          } else if (!isColour && zone.classList.contains('people-note-zone')) {
            const ids = this.answers[q.id].placements[zone.dataset.zone] || [];
            if (ids.length === 1) moveItem(ids[0], 'pool');
          }
        });
      });

      btnNext.disabled = !this.isValid(q);
    }

    saveDemographics() {
      const age = this.app.querySelector('input[name="age"]:checked');
      const gender = this.app.querySelector('input[name="gender"]:checked');
      this.answers.demographics = { age: age?.value, gender: gender?.value };
      document.getElementById('btn-next').disabled = !(age && gender);
    }

    restoreAnswer(q) {
      const btnNext = document.getElementById('btn-next');
      if (q.type === 'demographics' && this.answers.demographics) {
        for (const [field, val] of Object.entries(this.answers.demographics)) {
          const inp = this.app.querySelector(`input[name="${field}"][value="${val}"]`);
          if (inp) { inp.checked = true; inp.closest('.option').classList.add('selected'); }
        }
        btnNext.disabled = false;
      } else if ((q.type === 'single' || q.type === 'checkbox') && this.answers[q.id]) {
        const vals = Array.isArray(this.answers[q.id]) ? this.answers[q.id] : [this.answers[q.id]];
        vals.forEach(v => {
          const inp = this.app.querySelector(`input[value="${v}"]`);
          if (inp) { inp.checked = true; inp.closest('.option').classList.add('selected'); }
        });
        btnNext.disabled = false;
      } else if (q.type === 'rating' && this.answers[q.id]) {
        const btn = this.app.querySelector(`.rating-btn[data-val="${this.answers[q.id]}"]`);
        if (btn) btn.classList.add('selected');
        btnNext.disabled = false;
      } else if (q.type === 'text' && this.answers[q.id]) {
        document.getElementById(`text-${q.id}`).value = this.answers[q.id];
        btnNext.disabled = false;
      }
    }

    isValid(q) {
      if (q.type === 'demographics') return this.answers.demographics?.age && this.answers.demographics?.gender;
      if (q.type === 'single') return !!this.answers[q.id];
      if (q.type === 'checkbox') return Array.isArray(this.answers[q.id]) && this.answers[q.id].length > 0;
      if (q.type === 'rating') return this.answers[q.id] >= 1;
      if (q.type === 'text') return q.optional || (this.answers[q.id] || '').trim().length > 0;
      if (q.type === 'drag-colours' || q.type === 'drag-people') {
        const p = this.answers[q.id]?.placements || {};
        const placed = Object.values(p).flat();
        return placed.length === q.items.length;
      }
      return true;
    }

    next() {
      if (this.step < this.totalSteps - 1) { this.step++; this.renderStep(); }
      else this.finish();
    }

    updateProgress(phase) {
      const pct = Math.round(((this.step + 1) / this.totalSteps) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-phase').textContent = phase;
    }

    /* ── Scoring ── */
    score() {
      let earned = 0, total = 0;
      const details = [];

      for (const q of SURVEY_DATA) {
        if (!q.scored) continue;
        const ans = this.answers[q.id];

        if (q.type === 'single') {
          total++;
          const ok = ans === q.correct;
          if (ok) earned++;
          details.push({ q, ok, userAnswer: ans, correctAnswer: q.correct });
        } else if (q.type === 'checkbox') {
          total++;
          const a = new Set(ans || []), c = new Set(q.correct);
          const ok = a.size === c.size && [...a].every(v => c.has(v));
          if (ok) earned++;
          details.push({ q, ok, userAnswer: (ans||[]).join(', '), correctAnswer: q.correct.join(', ') });
        } else if (q.type === 'drag-colours' || q.type === 'drag-people') {
          const placements = ans?.placements || {};
          let qEarned = 0;
          const itemResults = [];
          for (const item of q.items) {
            total++;
            let placedZone = null;
            for (const [zone, ids] of Object.entries(placements)) {
              if (ids.includes(item.id)) placedZone = zone;
            }
            const ok = placedZone === item.correct;
            if (ok) { earned++; qEarned++; }
            itemResults.push({ id: item.id, ok });
          }
          const ok = qEarned === q.items.length;
          details.push({
            q, ok, itemResults,
            userAnswer: `${qEarned}/${q.items.length} correct`,
            correctAnswer: 'All matched',
          });
        }
      }
      return { earned, total, pct: total ? Math.round((earned / total) * 100) : 0, details };
    }

    getTier(pct) {
      if (pct >= 90) return 'Currency Expert';
      if (pct >= 70) return 'Well Informed';
      if (pct >= 50) return 'Getting There';
      return 'Room to Explore';
    }

    finish() {
      const result = this.score();
      result.answers = this.answers;
      result.timestamp = new Date().toISOString();
      result.version = VERSION;
      localStorage.setItem(LS_COMPLETED, '1');
      localStorage.setItem(LS_RESPONSE, JSON.stringify(result));
      this.mergeAggregate(result);
      this.renderResults(result);
    }

    mergeAggregate(result) {
      let agg = JSON.parse(localStorage.getItem(LS_AGGREGATE) || 'null');
      if (!agg || agg.version !== 2) {
        agg = JSON.parse(JSON.stringify(SEED_STATS));
      }
      agg.responses++;
      agg.totalScoreSum += result.earned;
      agg.totalMaxSum += result.total;

      for (const d of result.details) {
        const key = d.q.statKey;
        if (!key || !agg.questions[key]) continue;
        const qs = agg.questions[key];
        qs.total++;
        if (d.ok) qs.correct++;

        if (d.itemResults && qs.items) {
          for (const ir of d.itemResults) {
            if (!qs.items[ir.id]) continue;
            qs.items[ir.id].total++;
            if (ir.ok) qs.items[ir.id].correct++;
          }
        }
      }
      localStorage.setItem(LS_AGGREGATE, JSON.stringify(agg));
    }

    getAggregate() {
      const agg = JSON.parse(localStorage.getItem(LS_AGGREGATE) || 'null');
      if (!agg || agg.version !== 2) return JSON.parse(JSON.stringify(SEED_STATS));
      return agg;
    }

    buildStatsHTML(agg, userPct) {
      const avgPct = agg.totalMaxSum
        ? Math.round((agg.totalScoreSum / agg.totalMaxSum) * 100) : 52;
      const summary = `
        <div class="stats-summary">
          <div class="stat-card">
            <div class="stat-num">${avgPct}%</div>
            <div class="stat-lbl">Community average score</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${userPct}%</div>
            <div class="stat-lbl">Your score</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${agg.responses.toLocaleString()}</div>
            <div class="stat-lbl">Total responses</div>
          </div>
        </div>`;

      const bar = (label, correct, total) => {
        const p = total ? Math.round((correct / total) * 100) : 0;
        return `<div class="stat-bar-row">
          <div class="stat-bar-label"><span>${label}</span><span>${p}%</span></div>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${p}%"></div></div>
        </div>`;
      };

      let bars = '';
      for (const [, qs] of Object.entries(agg.questions)) {
        bars += bar(qs.label, qs.correct, qs.total);
        if (qs.items) {
          bars += `<div class="stats-subheading">Per-colour breakdown</div>`;
          for (const [, item] of Object.entries(qs.items)) {
            bars += bar(item.label, item.correct, item.total);
          }
        }
      }
      return summary + bars;
    }

    /* ── Results ── */
    renderResults(result) {
      document.getElementById('progress-wrap').classList.add('hidden');
      const { earned, total, pct, details } = result;
      const tier = this.getTier(pct);
      const agg = this.getAggregate();
      const statsHTML = this.buildStatsHTML(agg, pct);

      const accordion = details.map(d => {
        const icon = d.ok ? '✓' : '✗';
        const cls = d.ok ? 'correct' : 'wrong';
        return `<div class="acc-item">
          <div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
            <span class="acc-icon ${cls}">${icon}</span>
            <span>${d.q.question.replace(/<[^>]+>/g,'')}</span>
          </div>
          <div class="acc-body">
            <p class="acc-answer"><strong>Your answer:</strong> ${d.userAnswer || '—'}</p>
            <p class="acc-answer"><strong>Correct:</strong> ${d.correctAnswer}</p>
            <p>${d.q.explanation}</p>
          </div>
        </div>`;
      }).join('');

      this.app.innerHTML = `
        <div class="glass-card">
          <div class="score-ring-wrap">
            <div class="score-ring" style="--pct:${pct}"><span>${pct}%</span></div>
            <div class="tier-label">${tier}</div>
            <p>${earned} of ${total} points · Australian Currency Knowledge</p>
          </div>

          <h2 style="margin-bottom:1rem">Your Answers</h2>
          <div class="accordion">${accordion}</div>

          <div class="stats-section">
            <h2>Community Stats</h2>
            <p style="margin-bottom:1.2rem">Based on ${agg.responses.toLocaleString()} responses (simulated baseline — live analytics coming soon).</p>
            ${statsHTML}
          </div>

          <div class="results-actions">
            <button class="btn btn-primary" id="btn-copy">Copy Summary</button>
            <button class="btn btn-ghost" id="btn-json">Download JSON</button>
          </div>

          <div class="subscribe-section">
            <img src="images/oze-logo.webp" alt="oze.au" class="oze-logo" width="108" height="48">
            <h2>Enjoyed this survey?</h2>
            <p>Rate your experience and subscribe for more educational surveys from oze.au.</p>
            <div class="subscribe-form">
              <label for="survey-rating">How would you rate this survey?</label>
              <div class="star-rating" id="survey-rating" role="group" aria-label="Rate this survey">
                ${[1,2,3,4,5].map(n => `<button type="button" class="star-btn" data-star="${n}" aria-label="${n} star${n>1?'s':''}">★</button>`).join('')}
              </div>
              <label for="subscribe-email">Email address</label>
              <input type="email" class="email-input" id="subscribe-email" placeholder="you@example.com" autocomplete="email">
              <div class="subscribe-btns">
                <button class="btn btn-primary" id="btn-subscribe">Subscribe to more educational surveys</button>
                <button class="btn btn-ghost" id="btn-rating">Submit rating</button>
              </div>
              <p class="subscribe-msg" id="subscribe-msg" aria-live="polite"></p>
            </div>
          </div>
        </div>`;

      let selectedRating = 0;
      this.app.querySelectorAll('.star-btn').forEach(btn => {
        btn.onclick = () => {
          selectedRating = +btn.dataset.star;
          this.app.querySelectorAll('.star-btn').forEach((b, i) => {
            b.classList.toggle('active', i < selectedRating);
          });
        };
      });

      const showMsg = (text, ok) => {
        const el = document.getElementById('subscribe-msg');
        el.textContent = text;
        el.className = 'subscribe-msg ' + (ok ? 'ok' : 'err');
      };

      const sendFeedback = (type) => {
        const email = document.getElementById('subscribe-email').value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showMsg('Please enter a valid email address.', false);
          return;
        }
        if (type === 'rating' && !selectedRating) {
          showMsg('Please select a star rating.', false);
          return;
        }
        const subject = type === 'subscribe'
          ? 'Survey subscription — Money in Your Wallet'
          : 'Survey rating — Money in Your Wallet';
        const body = [
          `Email: ${email}`,
          selectedRating ? `Rating: ${selectedRating}/5 stars` : 'Rating: not provided',
          `Survey: Money in Your Wallet (survey.oze.au/money)`,
          `User score: ${pct}% (${earned}/${total})`,
          type === 'subscribe' ? 'Please add me to the educational surveys list.' : 'Survey feedback submitted.',
        ].join('\n');
        window.location.href = `mailto:${CONTACT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        const msg = type === 'subscribe'
          ? 'Opening your email app — send the message to subscribe.'
          : 'Opening your email app — send the message to submit your rating.';
        showMsg(msg, true);
        localStorage.setItem('oze-survey-money-v1-feedback', JSON.stringify({ email, rating: selectedRating, type, ts: Date.now() }));
      };

      document.getElementById('btn-subscribe').onclick = () => sendFeedback('subscribe');
      document.getElementById('btn-rating').onclick = () => sendFeedback('rating');

      document.getElementById('btn-copy').onclick = () => {
        const text = `Money in Your Wallet — ${tier}\nScore: ${earned}/${total} (${pct}%)\nhttps://survey.oze.au/money/`;
        navigator.clipboard.writeText(text).then(() => showMsg('Results copied to clipboard!', true));
      };
      document.getElementById('btn-json').onclick = () => {
        const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'oze-survey-money-results.json';
        a.click();
      };
    }
  }

  /* ── Theme toggle ── */
  document.getElementById('theme-toggle').onclick = () => {
    const html = document.documentElement;
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    localStorage.setItem('oze-theme', next);
    document.getElementById('theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
  };
  document.getElementById('theme-toggle').textContent =
    document.documentElement.dataset.theme === 'dark' ? '🌙' : '☀️';

  /* ── Privacy modal ── */
  document.getElementById('privacy-link').onclick = e => {
    e.preventDefault();
    alert('Privacy: This survey is fully anonymous. Answers are stored only in your browser (localStorage). No data is sent to any server in this version.');
  };

  /* ── Coin mote animation ── */
  (function initMotes() {
    if (document.body.dataset.animation === 'off') return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const canvas = document.getElementById('motes');
    const ctx = canvas.getContext('2d');
    let motes = [], running = true, W, H;

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const symbols = ['$','¢','5','10','20','50'];
    for (let i = 0; i < 18; i++) {
      motes.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.3, vy: -0.15 - Math.random() * 0.25,
        size: 10 + Math.random() * 14,
        sym: symbols[Math.floor(Math.random() * symbols.length)],
        alpha: 0.08 + Math.random() * 0.12,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.008,
      });
    }

    function draw() {
      if (!running) return;
      ctx.clearRect(0, 0, W, H);
      for (const m of motes) {
        m.x += m.vx; m.y += m.vy; m.rot += m.rotV;
        if (m.y < -20) { m.y = H + 20; m.x = Math.random() * W; }
        if (m.x < -20) m.x = W + 20;
        if (m.x > W + 20) m.x = -20;
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.rotate(m.rot);
        ctx.globalAlpha = m.alpha;
        ctx.font = `${m.size}px Fraunces, serif`;
        ctx.fillStyle = '#ffc107';
        ctx.fillText(m.sym, 0, 0);
        ctx.restore();
      }
      requestAnimationFrame(draw);
    }
    draw();
    document.addEventListener('visibilitychange', () => { running = !document.hidden; if (running) draw(); });
  })();

  /* ── Boot ── */
  new SurveyEngine().init();
  </script>
</body>
