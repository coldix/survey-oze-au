# survey.oze.au — deploy to oze.au hub subfolder
# Version: 1.0.0 | 1 Jul 2026
name: Deploy survey.oze.au

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.HOSTINGER_SSH_KEY_B64 }}" | tr -d '\n\r\t ' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy via rsync
        run: |
          rsync -av --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p 65002 -o BatchMode=yes -o ConnectTimeout=30 -o StrictHostKeyChecking=no -o ServerAliveInterval=30" \
            --exclude='.git' --exclude='.github' --exclude='.DS_Store' \
            --exclude='.well-known' --exclude='cgi-bin' --exclude='docs' \
            ./ u566466219@46.202.196.151:/home/u566466219/domains/oze.au/public_html/survey/